<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANKAI | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #ffffff; }
        .neon-text { color: #00f3ff; text-shadow: 0 0 10px rgba(0,243,255,0.5); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .status-red { background: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        .status-yellow { background: #f59e0b; box-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
        .status-green { background: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-5xl font-800 tracking-tighter neon-text">PANKAI</h1>
                <p class="text-gray-500 text-xs uppercase tracking-widest mt-1">Admin Intelligence — Hamburg</p>
            </div>
            <div class="text-right hidden md:block">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Status: Bereit</p>
                <p class="font-600 text-lg">TEAM LOGIN 🌟</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass p-8 rounded-[2rem]">
                <p class="text-gray-500 text-[10px] uppercase tracking-widest mb-3">Bestand Total</p>
                <p class="text-4xl font-bold">87 <span class="text-sm font-normal text-gray-500">ARTIKEL</span></p>
            </div>
            <div class="glass p-8 rounded-[2rem] border-l-4 border-red-500/50">
                <p class="text-red-500/80 text-[10px] uppercase tracking-widest mb-3">Bestands-Warnung</p>
                <p class="text-4xl font-bold text-red-500">5 <span class="text-sm font-normal text-gray-500">ITEMS KRITISCH</span></p>
            </div>
            <div class="glass p-8 rounded-[2rem]">
                <p class="text-gray-500 text-[10px] uppercase tracking-widest mb-3">Kategorien</p>
                <p class="text-4xl font-bold">5 <span class="text-sm font-normal text-gray-500">BEREICHE</span></p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="glass p-10 rounded-[2.5rem]">
                <h2 class="text-xl font-bold mb-8 flex items-center uppercase tracking-tight">
                    <span class="w-2 h-2 rounded-full bg-cyan-400 mr-3 shadow-[0_0_10px_#00f3ff]"></span> Bubble Tea Specials
                </h2>
                <div class="space-y-6">
                    <div class="flex justify-between items-center group">
                        <div class="flex items-center">
                            <div class="w-2 h-2 rounded-full status-red mr-5"></div>
                            <div>
                                <p class="font-600 text-lg">Tapioca (kg)</p>
                                <p class="text-xs text-gray-500">Lager: 4 / Soll: 20</p>
                            </div>
                        </div>
                        <button class="bg-white/5 px-5 py-2.5 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-white/10 transition">Bestellen</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
